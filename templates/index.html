<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cat vs Dog Classifier</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 2rem;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      max-width: 460px; width: 100%;
      overflow: hidden;
    }
    .header {
      background: #1a1a2e;
      padding: 2rem;
      text-align: center;
    }
    .header h1 { color: #fff; font-size: 22px; font-weight: 600; }
    .header p  { color: rgba(255,255,255,0.6); font-size: 13px; margin-top: 6px; }
    .body { padding: 1.5rem; }

    .drop-zone {
      border: 2px dashed #d1d5db;
      border-radius: 12px;
      padding: 2.5rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .drop-zone:hover { background: #f9fafb; border-color: #9ca3af; }
    .drop-icon { font-size: 32px; margin-bottom: 10px; }
    .drop-label { font-size: 14px; color: #374151; font-weight: 500; }
    .drop-sub   { font-size: 12px; color: #9ca3af; margin-top: 4px; }

    .preview-wrap {
      display: none; margin-top: 1rem;
      border-radius: 10px; overflow: hidden; position: relative;
    }
    .preview-wrap img { width: 100%; max-height: 240px; object-fit: cover; display: block; }
    .change-btn {
      position: absolute; top: 8px; right: 8px;
      background: rgba(0,0,0,0.55); color: #fff;
      font-size: 11px; padding: 4px 10px;
      border-radius: 20px; border: none; cursor: pointer;
    }

    .classify-btn {
      width: 100%; margin-top: 1rem;
      padding: 12px; background: #1a1a2e; color: #fff;
      border: none; border-radius: 10px;
      font-size: 15px; font-weight: 600; cursor: pointer;
      transition: opacity 0.2s;
    }
    .classify-btn:hover  { opacity: 0.88; }
    .classify-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .spinner {
      display: none; margin: 1rem auto 0;
      width: 24px; height: 24px;
      border: 3px solid #e5e7eb;
      border-top-color: #1a1a2e;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .result {
      display: none; margin-top: 1rem;
      background: #f9fafb; border: 1px solid #e5e7eb;
      border-radius: 12px; padding: 1.5rem;
      text-align: center;
    }
    .result-emoji { font-size: 48px; margin-bottom: 6px; }
    .result-label { font-size: 24px; font-weight: 700; color: #111827; }
    .result-conf  { font-size: 13px; color: #6b7280; margin-top: 4px; }
    .bar-wrap { margin-top: 12px; background: #e5e7eb; border-radius: 99px; height: 6px; }
    .bar      { height: 6px; border-radius: 99px; background: #1a1a2e; transition: width 0.6s ease; }

    .error { display: none; margin-top: 0.75rem; color: #dc2626; font-size: 13px; text-align: center; }
  </style>
</head>
<body>
<div class="card">
  <div class="header">
    <h1>🐶 Cat vs Dog Classifier 🐱</h1>
    <p>Upload a photo and let the model decide</p>
  </div>
  <div class="body">
    <div class="drop-zone" id="dropZone" onclick="fileInput.click()">
      <div class="drop-icon">📷</div>
      <div class="drop-label">Click to upload an image</div>
      <div class="drop-sub">JPG, PNG, WEBP supported</div>
    </div>
    <input type="file" id="fileInput" accept="image/*" style="display:none">

    <div class="preview-wrap" id="previewWrap">
      <img id="previewImg" src="" alt="Preview">
      <button class="change-btn" onclick="fileInput.click()">Change</button>
    </div>

    <button class="classify-btn" id="classifyBtn" disabled onclick="classify()">
      Classify Image
    </button>

    <div class="spinner" id="spinner"></div>
    <div class="error"   id="errorMsg"></div>

    <div class="result" id="result">
      <div class="result-emoji" id="rEmoji"></div>
      <div class="result-label" id="rLabel"></div>
      <div class="result-conf"  id="rConf"></div>
      <div class="bar-wrap"><div class="bar" id="rBar" style="width:0%"></div></div>
    </div>
  </div>
</div>

<script>
  const fileInput   = document.getElementById('fileInput');
  const previewWrap = document.getElementById('previewWrap');
  const previewImg  = document.getElementById('previewImg');
  const classifyBtn = document.getElementById('classifyBtn');
  const spinner     = document.getElementById('spinner');
  const resultBox   = document.getElementById('result');
  const errorMsg    = document.getElementById('errorMsg');

  fileInput.addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    previewImg.src = URL.createObjectURL(file);
    previewWrap.style.display = 'block';
    classifyBtn.disabled = false;
    resultBox.style.display = 'none';
    errorMsg.style.display  = 'none';
  });

  async function classify() {
    const file = fileInput.files[0];
    if (!file) return;

    classifyBtn.disabled = true;
    spinner.style.display = 'block';
    resultBox.style.display = 'none';
    errorMsg.style.display  = 'none';

    const form = new FormData();
    form.append('file', file);

    try {
      const res  = await fetch('/predict', { method: 'POST', body: form });
      const data = await res.json();

      if (data.error) throw new Error(data.error);

      document.getElementById('rEmoji').textContent = data.emoji;
      document.getElementById('rLabel').textContent = data.label;
      document.getElementById('rConf').textContent  = `${data.confidence}% confidence`;
      document.getElementById('rBar').style.width   = data.confidence + '%';
      resultBox.style.display = 'block';
    } catch (err) {
      errorMsg.textContent    = '⚠️ Error: ' + err.message;
      errorMsg.style.display  = 'block';
    } finally {
      spinner.style.display   = 'none';
      classifyBtn.disabled    = false;
    }
  }
</script>
</body>
</html>
