<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cat or Dog? 🐾</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #fdf6fb;
      min-height: 100vh;
      padding: 2rem 1rem;
    }
    .page { max-width: 520px; margin: 0 auto; }

    .hero { text-align: center; padding: 2rem 0 1.5rem; }
    .hero-emoji { font-size: 52px; display: block; margin-bottom: 12px; }
    .hero h1 { font-size: 28px; font-weight: 700; color: #7c3aed; letter-spacing: -0.5px; }
    .hero p  { font-size: 14px; color: #a78bfa; margin-top: 6px; }

    .drop-zone {
      background: #fff;
      border-radius: 24px;
      border: 2px dashed #ddd6fe;
      padding: 2.5rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .drop-zone:hover, .drop-zone.dragging { border-color: #a78bfa; background: #faf5ff; }
    .drop-icon  { font-size: 38px; margin-bottom: 10px; }
    .drop-title { font-size: 15px; font-weight: 600; color: #6d28d9; }
    .drop-sub   { font-size: 12px; color: #c4b5fd; margin-top: 4px; }

    .preview-wrap {
      display: none;
      margin-top: 1.25rem;
      border-radius: 20px;
      overflow: hidden;
      position: relative;
      background: #f3f0ff;
    }
    .preview-wrap img { width: 100%; max-height: 240px; object-fit: cover; display: block; }
    .change-pill {
      position: absolute; top: 10px; right: 10px;
      background: rgba(109,40,217,0.75); color: #fff;
      font-size: 11px; font-weight: 600;
      padding: 5px 14px; border-radius: 99px;
      border: none; cursor: pointer;
    }

    .classify-btn {
      width: 100%; margin-top: 1.25rem;
      padding: 14px;
      background: linear-gradient(135deg, #a78bfa, #ec4899);
      color: #fff; border: none;
      border-radius: 99px;
      font-size: 15px; font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }
    .classify-btn:hover  { opacity: 0.9; transform: translateY(-1px); }
    .classify-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

    .loading {
      display: none;
      text-align: center;
      padding: 1.5rem 0;
    }
    .paw-bounce { font-size: 26px; animation: bounce 0.55s infinite alternate; }
    @keyframes bounce { to { transform: translateY(-7px); } }
    .loading-text { font-size: 13px; color: #a78bfa; margin-top: 8px; }

    .result { display: none; margin-top: 1.25rem; }
    .result-banner { border-radius: 20px; padding: 1.75rem; text-align: center; }
    .result-banner.cat { background: #fdf4ff; border: 1.5px solid #e9d5ff; }
    .result-banner.dog { background: #fff7ed; border: 1.5px solid #fed7aa; }
    .result-emoji { font-size: 56px; margin-bottom: 8px; }
    .result-label { font-size: 24px; font-weight: 700; }
    .result-label.cat { color: #7c3aed; }
    .result-label.dog { color: #ea580c; }
    .result-conf  { font-size: 13px; color: #9ca3af; margin-top: 6px; }

    .bars { margin-top: 1.25rem; display: flex; flex-direction: column; gap: 12px; }
    .bar-row { display: flex; align-items: center; gap: 10px; }
    .bar-lbl  { font-size: 16px; width: 28px; text-align: center; }
    .bar-track { flex: 1; height: 10px; background: #f3f4f6; border-radius: 99px; overflow: hidden; }
    .bar-fill  { height: 100%; border-radius: 99px; width: 0%; transition: width 0.7s cubic-bezier(.4,0,.2,1); }
    .bar-fill.cat { background: #a78bfa; }
    .bar-fill.dog { background: #fb923c; }
    .bar-pct { font-size: 12px; font-weight: 600; width: 34px; text-align: right; color: #6b7280; }

    .try-again {
      display: block; margin: 1rem auto 0;
      font-size: 13px; color: #a78bfa;
      text-decoration: underline;
      background: none; border: none; cursor: pointer;
    }

    .footer { text-align: center; padding: 2rem 0 0; font-size: 12px; color: #c4b5fd; }
  </style>
</head>
<body>
<div class="page">

  <div class="hero">
    <span class="hero-emoji">🐾</span>
    <h1>Cat or Dog?</h1>
    <p>Drop a photo and we'll figure it out</p>
  </div>

  <div class="drop-zone" id="dropZone" onclick="fileInput.click()">
    <div class="drop-icon">📸</div>
    <div class="drop-title">Click or drag an image here</div>
    <div class="drop-sub">JPG · PNG · WEBP supported</div>
  </div>
  <input type="file" id="fileInput" accept="image/*" style="display:none">

  <div class="preview-wrap" id="previewWrap">
    <img id="previewImg" src="" alt="preview">
    <button class="change-pill" onclick="fileInput.click()">change</button>
  </div>

  <button class="classify-btn" id="classifyBtn" disabled onclick="classify()">
    ✨ Classify!
  </button>

  <div class="loading" id="loading">
    <div class="paw-bounce">🐾</div>
    <div class="loading-text">Sniffing around...</div>
  </div>

  <div class="result" id="result">
    <div class="result-banner" id="resultBanner">
      <div class="result-emoji" id="rEmoji"></div>
      <div class="result-label" id="rLabel"></div>
      <div class="result-conf"  id="rConf"></div>
    </div>
    <div class="bars">
      <div class="bar-row">
        <span class="bar-lbl">🐱</span>
        <div class="bar-track"><div class="bar-fill cat" id="catBar"></div></div>
        <span class="bar-pct" id="catPct">0%</span>
      </div>
      <div class="bar-row">
        <span class="bar-lbl">🐶</span>
        <div class="bar-track"><div class="bar-fill dog" id="dogBar"></div></div>
        <span class="bar-pct" id="dogPct">0%</span>
      </div>
    </div>
    <button class="try-again" onclick="reset()">Try another photo</button>
  </div>

  <div class="footer">made with 💜 · powered by Random Forest</div>
</div>

<script>
  const dropZone    = document.getElementById('dropZone');
  const fileInput   = document.getElementById('fileInput');
  const previewWrap = document.getElementById('previewWrap');
  const previewImg  = document.getElementById('previewImg');
  const classifyBtn = document.getElementById('classifyBtn');
  const loading     = document.getElementById('loading');
  const result      = document.getElementById('result');

  fileInput.addEventListener('change', e => loadFile(e.target.files[0]));

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragging'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragging'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault(); dropZone.classList.remove('dragging');
    const f = e.dataTransfer.files[0];
    if (f && f.type.startsWith('image/')) loadFile(f);
  });

  function loadFile(file) {
    if (!file) return;
    const dt = new DataTransfer(); dt.items.add(file); fileInput.files = dt.files;
    previewImg.src = URL.createObjectURL(file);
    previewWrap.style.display = 'block';
    classifyBtn.style.display = 'block';
    classifyBtn.disabled = false;
    result.style.display = 'none';
    loading.style.display = 'none';
  }

  async function classify() {
    const file = fileInput.files[0]; if (!file) return;
    classifyBtn.style.display = 'none';
    loading.style.display = 'block';
    result.style.display  = 'none';

    const form = new FormData(); form.append('file', file);

    try {
      const res  = await fetch('/predict', { method: 'POST', body: form });
      const data = await res.json();
      if (data.error) throw new Error(data.error);

      const isCat = data.label === 'Cat';
      const catP  = isCat ? Math.round(data.confidence) : 100 - Math.round(data.confidence);
      const dogP  = 100 - catP;

      document.getElementById('resultBanner').className = 'result-banner ' + (isCat ? 'cat' : 'dog');
      document.getElementById('rEmoji').textContent = data.emoji;
      const lbl = document.getElementById('rLabel');
      lbl.textContent = "It's a " + data.label + "!";
      lbl.className = 'result-label ' + (isCat ? 'cat' : 'dog');
      document.getElementById('rConf').textContent = Math.round(data.confidence) + '% confidence';

      loading.style.display = 'none';
      result.style.display  = 'block';

      setTimeout(() => {
        document.getElementById('catBar').style.width = catP + '%';
        document.getElementById('dogBar').style.width = dogP + '%';
        document.getElementById('catPct').textContent = catP + '%';
        document.getElementById('dogPct').textContent = dogP + '%';
      }, 80);

    } catch (err) {
      loading.style.display = 'none';
      classifyBtn.style.display = 'block';
      classifyBtn.disabled = false;
      alert('Oops! ' + err.message);
    }
  }

  function reset() {
    fileInput.value = '';
    previewWrap.style.display = 'none';
    result.style.display = 'none';
    loading.style.display = 'none';
    classifyBtn.style.display = 'block';
    classifyBtn.disabled = true;
    document.getElementById('catBar').style.width = '0%';
    document.getElementById('dogBar').style.width = '0%';
    document.getElementById('catPct').textContent = '0%';
    document.getElementById('dogPct').textContent = '0%';
  }
</script>
</body>
</html>
